<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="display:flex;gap:20px;align-items:center">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;background:var(--paper-bright);border:1px solid var(--rule);border-radius:0"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">0</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;background:var(--paper-bright);border:1px solid var(--rule);border-radius:4px"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">4 · default</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;background:var(--paper-bright);border:1px solid var(--rule);border-radius:8px"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">8 · media</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:32px;background:var(--clay-soft);border:1px solid var(--rule);border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--clay);font-weight:600;letter-spacing:0.1em;text-transform:uppercase">Pill</div>
      <div class="label" style="text-transform:none;letter-spacing:0">999 · pill</div>
    </div>
  </div>
  <div class="label" style="margin-top:14px">Radius — sharp by default. We avoid 16+ px (consumer-app feel).</div>
</div></body></html>
