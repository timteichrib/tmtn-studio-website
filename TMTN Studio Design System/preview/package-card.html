<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="background:var(--paper-bright);border:1px solid var(--ink);border-radius:4px;padding:28px;max-width:300px;box-shadow:0 8px 32px rgba(21,36,61,.10);position:relative">
    <span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--clay);color:var(--paper);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:5px 14px;border-radius:999px">Beliebt</span>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
      <h3 style="font-family:var(--font-body);font-weight:600;font-size:20px;color:var(--ink);margin:0">Standard</h3>
      <span class="numglyph">02 / 03</span>
    </div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 18px">Für Unternehmen mit mehreren Leistungen</p>
    <div style="display:flex;align-items:baseline;gap:6px;padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--rule)">
      <span style="font-family:var(--font-display);font-weight:600;font-size:42px;letter-spacing:-0.03em;color:var(--ink)">120 €</span>
      <span style="font-size:14px;color:var(--ink-soft)">/ Monat</span>
    </div>
    <ul style="list-style:none;padding:0;margin:0 0 18px;font-size:14px;color:var(--ink)">
      <li style="padding:5px 0 5px 22px;position:relative">Bis zu 5 Unterseiten
        <span style="position:absolute;left:0;top:8px;color:var(--moss);font-weight:700">✓</span></li>
      <li style="padding:5px 0 5px 22px;position:relative">Lokale SEO-Optimierung
        <span style="position:absolute;left:0;top:8px;color:var(--moss);font-weight:700">✓</span></li>
      <li style="padding:5px 0 5px 22px;position:relative">5 Änderungen / Monat
        <span style="position:absolute;left:0;top:8px;color:var(--moss);font-weight:700">✓</span></li>
    </ul>
    <button style="width:100%;font-family:var(--font-body);font-weight:600;font-size:15px;padding:12px;border-radius:4px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer">Standard wählen</button>
  </div>
</div></body></html>
