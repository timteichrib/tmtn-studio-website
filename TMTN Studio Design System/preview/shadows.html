<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn" style="background:var(--paper)">
  <div style="display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:var(--paper-bright);border:1px solid var(--rule);border-radius:4px"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">none · default</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:var(--paper-bright);border-radius:4px;box-shadow:0 1px 2px rgba(21,36,61,.04),0 2px 8px rgba(21,36,61,.04)"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">sm · floating UI</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:var(--paper-bright);border-radius:4px;box-shadow:0 4px 16px rgba(21,36,61,.06),0 2px 4px rgba(21,36,61,.04)"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">md · demo frame</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:var(--paper-bright);border-radius:4px;box-shadow:0 8px 32px rgba(21,36,61,.10)"></div>
      <div class="label" style="text-transform:none;letter-spacing:0">lg · featured only</div>
    </div>
  </div>
  <div class="label" style="margin-top:14px">Shadows are restrained. Default elevation is no shadow — borders carry the work.</div>
</div></body></html>
