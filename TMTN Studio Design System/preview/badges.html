<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <span style="font-family:var(--font-body);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--clay);background:var(--clay-soft);padding:6px 12px;border-radius:999px">Websites im Abo</span>
    <span style="font-family:var(--font-body);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--paper);background:var(--clay);padding:5px 14px;border-radius:999px">Beliebt</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-size:13px;color:var(--moss);background:var(--moss-soft);padding:5px 10px;border-radius:4px;font-weight:500">

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
