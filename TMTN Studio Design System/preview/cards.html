<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:640px">
    <div style="background:var(--paper-bright);border:1px solid var(--rule);border-radius:4px;padding:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="width:40px;height:40px;background:var(--paper-deep);border-radius:4px;display:flex;align-items:center;justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink)"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        </div>
        <span class="numglyph">01</span>
      </div>
      <h3 style="font-family:var(--font-body);font-weight:600;font-size:18px;letter-spacing:-0.01em;color:var(--ink);margin:0 0 6px">Komplett eingerichtet</h3>
      <p style="font-size:14px;line-height:1.55;color:var(--ink-soft);margin:0">Domain, Hosting, SSL und Impressum – wir richten alles ein.</p>
    </div>
    <div style="background:var(--paper-bright);border:1px solid var(--ink);border-radius:4px;padding:24px;box-shadow:0 8px 32px rgba(21,36,61,.10)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="width:40px;height:40px;background:var(--clay-soft);border-radius:4px;display:flex;align-items:center;justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--clay)"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
        </div>
        <span class="numglyph">02 · featured</span>
      </div>
      <h3 style="font-family:var(--font-body);font-weight:600;font-size:18px;letter-spacing:-0.01em;color:var(--ink);margin:0 0 6px">Individuelles Design</h3>
      <p style="font-size:14px;line-height:1.55;color:var(--ink-soft);margin:0">Keine austauschbaren Templates. Auf Ihre Region zugeschnitten.</p>
    </div>
  </div>
  <div class="label" style="margin-top:12px">Default card · Featured card (ink border + lg shadow)</div>
</div></body></html>
