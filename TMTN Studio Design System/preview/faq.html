<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:560px">
    <details open style="border:1px solid var(--rule);border-radius:4px;background:var(--paper-bright);padding:14px 18px">
      <summary style="font-weight:500;font-size:15px;cursor:pointer;list-style:none;color:var(--ink)">Wie lange dauert es?</summary>
      <p style="font-size:14px;color:var(--ink-soft);margin:8px 0 0">In der Regel 7 Werktage nach unserem ersten Gespräch.</p>
    </details>
    <details style="border:1px solid var(--rule);border-radius:4px;background:var(--paper-bright);padding:14px 18px">
      <summary style="font-weight:500;font-size:15px;cursor:pointer;list-style:none;color:var(--ink)">Gehört die Domain mir?</summary>
    </details>
  </div>
  <div class="label" style="margin-top:12px">Open · Closed — 1-px rule, 4-px radius, paper-bright surface</div>
</div></body></html>
