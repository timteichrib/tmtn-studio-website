<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame">
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">
    <div class="swatch"><div class="swatch-chip" style="background:#B85D3A"></div>
      <div class="swatch-name">Clay</div><div class="swatch-hex">#B85D3A</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#934628"></div>
      <div class="swatch-name">Clay Deep</div><div class="swatch-hex">#934628</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#F2DCCB"></div>
      <div class="swatch-name">Clay Soft</div><div class="swatch-hex">#F2DCCB</div></div>
    <div style="width:1px;height:90px;background:var(--rule);margin:0 8px"></div>
    <div class="swatch"><div class="swatch-chip" style="background:#2D6A4F"></div>
      <div class="swatch-name">Moss</div><div class="swatch-hex">#2D6A4F</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#DCEAE2"></div>
      <div class="swatch-name">Moss Soft</div><div class="swatch-hex">#DCEAE2</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#9C2A1F"></div>
      <div class="swatch-name">Rust</div><div class="swatch-hex">#9C2A1F</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#F4D8D3"></div>
      <div class="swatch-name">Rust Soft</div><div class="swatch-hex">#F4D8D3</div></div>
  </div>
  <div class="label" style="margin-top:18px">Accent — Clay · Semantic — Moss (success), Rust (error). No yellow warning.</div>
</div></body></html>
