<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame">
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">
    <div class="swatch"><div class="swatch-chip" style="background:#F5F1EA"></div>
      <div class="swatch-name">Paper</div><div class="swatch-hex">#F5F1EA</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#EBE5DA"></div>
      <div class="swatch-name">Paper Deep</div><div class="swatch-hex">#EBE5DA</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#FFFFFF"></div>
      <div class="swatch-name">Paper Bright</div><div class="swatch-hex">#FFFFFF</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#15243D"></div>
      <div class="swatch-name" style="color:var(--ink)">Ink</div><div class="swatch-hex">#15243D</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#0B1626"></div>
      <div class="swatch-name">Ink Deep</div><div class="swatch-hex">#0B1626</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#5A6A82"></div>
      <div class="swatch-name">Ink Soft</div><div class="swatch-hex">#5A6A82</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#8A95A8"></div>
      <div class="swatch-name">Ink Faint</div><div class="swatch-hex">#8A95A8</div></div>
  </div>
</div></body></html>
