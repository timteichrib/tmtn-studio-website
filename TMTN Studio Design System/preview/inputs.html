<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px">
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink)">Unternehmensname</label>
      <input type="text" value="Bäckerei Schneider" style="width:100%;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--paper-bright);border:1px solid var(--rule);border-radius:4px">
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink)">Standort</label>
      <input type="text" placeholder="z. B. München" style="width:100%;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--ink-soft);background:var(--paper-bright);border:1px solid var(--ink);border-radius:4px;box-shadow:0 0 0 3px rgba(21,36,61,.18);outline:none">
    </div>
  </div>
  <div class="label" style="margin-top:12px">Default · Focused (3-px focus ring on ink border)</div>
</div></body></html>
