<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card-frame tmtn">
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <button style="font-family:var(--font-body);font-weight:600;font-size:15px;padding:14px 22px;border-radius:4px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);letter-spacing:-0.01em;cursor:pointer">Pakete ansehen</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:15px;padding:14px 22px;border-radius:4px;border:1px solid var(--rule);background:var(--paper-bright);color:var(--ink);letter-spacing:-0.01em;cursor:pointer">Beratung anfragen</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:15px;padding:14px 22px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--ink);letter-spacing:-0.01em;cursor:pointer;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px">Demo erstellen →</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:13px;padding:10px 16px;border-radius:4px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);letter-spacing:-0.01em;cursor:pointer">Anfragen</button>
  </div>
  <div class="label" style="margin-top:12px">Primary · Outline · Ghost · Small — Inter 600 · 4-px radius · 1-px border</div>
</div></body></html>
